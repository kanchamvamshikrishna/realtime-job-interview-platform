services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: http://localhost:8080
      MONGO_URI: mongodb://mongo:27017/job-interview-platform
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@kribudwebtech.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
      SEED_RECRUITER_EMAIL: ${SEED_RECRUITER_EMAIL:-recruiter@kribudwebtech.com}
      SEED_RECRUITER_PASSWORD: ${SEED_RECRUITER_PASSWORD:-Recruiter@12345}
      SEED_CANDIDATE_EMAIL: ${SEED_CANDIDATE_EMAIL:-candidate@kribudwebtech.com}
      SEED_CANDIDATE_PASSWORD: ${SEED_CANDIDATE_PASSWORD:-Candidate@12345}
    ports:
      - '4000:4000'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mongo_data:
